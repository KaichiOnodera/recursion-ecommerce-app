version: "3.8"

name: recursion-ecommerce-app-test

services:
  db-test:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --skip-log-bin
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ecommerce_test
      MYSQL_USER: test_user
      MYSQL_PASSWORD: test_password
    ports:
      - "33306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 5s
    tmpfs:
      - /var/lib/mysql

networks:
  default:
    name: recursion-ecommerce-app-test

