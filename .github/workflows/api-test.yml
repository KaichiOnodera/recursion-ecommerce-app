name: API Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "api/**"
      - ".github/workflows/api-test.yml"
  pull_request:
    # 一時的にすべてのPRで実行（動作確認用）
    # TODO: 動作確認後、branches: [main, develop] に戻す
    paths:
      - "api/**"
      - ".github/workflows/api-test.yml"
  workflow_dispatch: # 手動実行を有効化

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: ecommerce_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: ./api
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./api
        run: npx prisma generate

      - name: Create .env.test file
        working-directory: ./api
        run: |
          echo 'DATABASE_URL="mysql://test_user:test_password@localhost:3306/ecommerce_test"' > .env.test
          echo 'NODE_ENV=test' >> .env.test

      - name: Run database migrations
        working-directory: ./api
        run: npm run migrate:test

      - name: Run API tests
        working-directory: ./api
        run: npm run test:api

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: api/coverage/
          if-no-files-found: ignore
